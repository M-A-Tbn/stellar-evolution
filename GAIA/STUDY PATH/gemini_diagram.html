<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 M☉ — The Sun's Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<script>
MathJax = {
  tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']], processEscapes: true },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<style>
    :root {
        --bg-deep: #05060d;
        --bg-outer: #0a0e1c;
        --card-bg: rgba(16, 19, 31, 0.7);
        --border-light: rgba(255, 255, 255, 0.1);
        --border-glow: rgba(245, 215, 110, 0.15);
        --text-main: #e9e7f2;
        --text-dim: #a6a7c2;
        --sym: #f5d76e;
    }
    body {
        background: 
            radial-gradient(1000px 800px at 80% 0%, rgba(245,215,110,0.05), transparent 60%),
            radial-gradient(900px 600px at 15% 100%, rgba(120,120,220,0.06), transparent 60%),
            linear-gradient(160deg, var(--bg-deep), var(--bg-outer));
        background-color: var(--bg-outer);
        color: var(--text-main);
        font-family: 'Space Grotesk', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }
    .container {
        max-width: 1240px;
        width: 100%;
        padding: 40px 20px 80px 20px;
        box-sizing: border-box;
    }
    h1 {
        font-family: 'Source Serif 4', serif;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 700;
        text-align: center;
        margin: 0 0 35px 0;
        text-shadow: 0 2px 15px rgba(245, 215, 110, 0.2);
    }
    h1 .sym {
        color: var(--sym);
    }
    .card {
        background: var(--card-bg);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
        backdrop-filter: blur(16px);
        position: relative;
        overflow: hidden;
    }
    .hr-diagram {
        width: 100%;
        height: auto;
        display: block;
        touch-action: manipulation;
    }

    /* SVG Elements Styling */
    .grid-line {
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 1;
    }
    .axis-line {
        stroke: rgba(255, 255, 255, 0.15);
        stroke-width: 2;
        stroke-linecap: round;
    }
    .tick-text {
        fill: var(--text-dim);
        font-size: 13px;
        font-family: 'Space Grotesk', sans-serif;
    }
    .axis-label {
        fill: var(--text-main);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .zams-band {
        stroke: rgba(160, 170, 255, 0.1);
        stroke-width: 25;
        stroke-linecap: round;
    }
    .zams-core {
        stroke: rgba(160, 170, 255, 0.4);
        stroke-width: 3;
        stroke-dasharray: 6 8;
        stroke-linecap: round;
    }
    .zams-label {
        fill: #7d86bd;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
    }
    .instability-strip {
        fill: url(#instabilityGrad);
    }
    .instability-label {
        fill: rgba(120, 180, 255, 0.35);
        font-size: 13px;
        font-style: italic;
        letter-spacing: 1px;
    }
    .hayashi-zone {
        fill: rgba(232, 144, 122, 0.03);
    }
    .hayashi-line {
        fill: none;
        stroke: #e8907a;
        stroke-width: 2.2;
        stroke-dasharray: 8 6;
        opacity: 0.6;
        stroke-linecap: round;
    }
    .hayashi-label {
        fill: #e8907a;
        font-size: 13px;
        font-family: 'Source Serif 4', serif;
        font-style: italic;
        opacity: 0.8;
    }
    .bg-track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 2;
        stroke-linecap: round;
    }
    .bg-track-label {
        fill: var(--text-dim);
        font-size: 12px;
        font-style: italic;
    }

    /* Segments */
    .seg {
        fill: none;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke-width 0.3s ease, opacity 0.3s ease;
    }
    .seg-recessive {
        stroke-width: 2.5;
        stroke-dasharray: 6 8;
        opacity: 0.4;
    }
    .seg-recessive:hover {
        opacity: 0.8;
    }
    .seg-hit {
        fill: none;
        stroke: transparent;
        stroke-width: 30;
        stroke-linecap: round;
        cursor: pointer;
    }

    /* Points */
    .node {
        cursor: pointer;
        outline: none;
    }
    .pt {
        fill: #ffffff;
        stroke: var(--pc);
        stroke-width: 3.5;
        filter: drop-shadow(0 0 7px var(--pc));
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .node:hover .pt, .node:focus .pt {
        stroke-width: 5.5;
        filter: drop-shadow(0 0 14px var(--pc));
    }
    .pt-num {
        fill: #0a0e1c;
        font-size: 13px;
        font-weight: 700;
        font-family: 'Space Grotesk', sans-serif;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
    }
    .pt-lbl {
        fill: var(--text-main);
        font-size: 14px;
        font-weight: 600;
        pointer-events: none;
        opacity: 0;
        transition: all 0.3s ease;
        paint-order: stroke;
        stroke: var(--bg-deep);
        stroke-width: 6px;
        stroke-linejoin: round;
        transform: translateY(4px);
    }
    .node:hover .pt-lbl, .node:focus .pt-lbl {
        opacity: 1;
        transform: translateY(0);
    }

    /* Pulse for p4 (He flash) */
    @keyframes pulseFlash {
        0% { filter: drop-shadow(0 0 7px #ff7a45); stroke-width: 3.5; }
        50% { filter: drop-shadow(0 0 20px #ff7a45); stroke-width: 5; fill: #ffe9a8; }
        100% { filter: drop-shadow(0 0 7px #ff7a45); stroke-width: 3.5; }
    }
    .node[data-pt="p4"] .pt {
        animation: pulseFlash 2.5s infinite ease-in-out;
    }

    /* Legend */
    .legend {
        display: flex;
        justify-content: center;
        gap: 22px;
        margin-top: 35px;
        font-size: 0.85rem;
        color: var(--text-dim);
        flex-wrap: wrap;
        padding: 0 10px;
    }
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .legend-color {
        width: 22px;
        height: 4px;
        border-radius: 2px;
    }
    .legend-dash {
        width: 22px;
        height: 0;
        border-top: 3px dashed;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>1 M<span class="sym">☉</span> — The Sun's Journey</h1>
        
        <div class="card">
            <svg class="hr-diagram" viewBox="0 0 980 730" xmlns="http://www.w3.org/2000/svg" aria-label="Interactive Hertzsprung-Russell diagram of the 1 solar mass evolutionary track">
                
                <defs>
                    <!-- Nebula filter near Planetary Nebula -->
                    <radialGradient id="nebulaPn" cx="178" cy="122" r="180" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#cfe3ff" stop-opacity="0.15"/>
                        <stop offset="35%" stop-color="#4a90e2" stop-opacity="0.08"/>
                        <stop offset="70%" stop-color="#6a3ba2" stop-opacity="0.02"/>
                        <stop offset="100%" stop-color="#05060d" stop-opacity="0"/>
                    </radialGradient>

                    <!-- Hero Track Plasma Glow -->
                    <filter id="plasmaGlow" x="-30%" y="-30%" width="160%" height="160%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1" />
                        <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2" />
                        <feMerge>
                            <feMergeNode in="blur2" />
                            <feMergeNode in="blur1" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>

                    <!-- Instability Strip Gradient -->
                    <linearGradient id="instabilityGrad" x1="0" x2="1" y1="0" y2="0">
                        <stop offset="0%" stop-color="#78b4ff" stop-opacity="0"/>
                        <stop offset="25%" stop-color="#78b4ff" stop-opacity="0.04"/>
                        <stop offset="75%" stop-color="#78b4ff" stop-opacity="0.04"/>
                        <stop offset="100%" stop-color="#78b4ff" stop-opacity="0"/>
                    </linearGradient>
                </defs>

                <!-- Grid -->
                <g class="grid-line">
                    <line x1="95" y1="65.5" x2="930" y2="65.5"/>
                    <line x1="95" y1="168" x2="930" y2="168"/>
                    <line x1="95" y1="270.5" x2="930" y2="270.5"/>
                    <line x1="95" y1="373" x2="930" y2="373"/>
                    <line x1="95" y1="475.5" x2="930" y2="475.5"/>
                    <line x1="95" y1="578" x2="930" y2="578"/>
                    <line x1="223.6" y1="45" x2="223.6" y2="660"/>
                    <line x1="432.3" y1="45" x2="432.3" y2="660"/>
                    <line x1="564.3" y1="45" x2="564.3" y2="660"/>
                    <line x1="726.3" y1="45" x2="726.3" y2="660"/>
                    <line x1="823.1" y1="45" x2="823.1" y2="660"/>
                </g>

                <!-- SVG Starfield -->
                <g id="starfield">
                    <circle cx="150" cy="180" r="1.5" fill="#ffffff" opacity="0.5"/>
                    <circle cx="280" cy="120" r="2" fill="#ffffff" opacity="0.2"/>
                    <circle cx="450" cy="250" r="1" fill="#ffffff" opacity="0.7"/>
                    <circle cx="620" cy="140" r="1.8" fill="#ffffff" opacity="0.3"/>
                    <circle cx="850" cy="210" r="1.2" fill="#ffffff" opacity="0.6"/>
                    <circle cx="920" cy="380" r="2.2" fill="#ffffff" opacity="0.15"/>
                    <circle cx="780" cy="450" r="1.5" fill="#ffffff" opacity="0.4"/>
                    <circle cx="610" cy="520" r="1" fill="#ffffff" opacity="0.5"/>
                    <circle cx="890" cy="620" r="1.7" fill="#ffffff" opacity="0.3"/>
                    <circle cx="420" cy="640" r="2" fill="#ffffff" opacity="0.2"/>
                    <circle cx="210" cy="580" r="1.2" fill="#ffffff" opacity="0.7"/>
                    <circle cx="120" cy="430" r="1.8" fill="#ffffff" opacity="0.4"/>
                    <circle cx="340" cy="360" r="1" fill="#ffffff" opacity="0.6"/>
                    <circle cx="530" cy="330" r="1.5" fill="#ffffff" opacity="0.3"/>
                    <!-- Tiny speckles -->
                    <circle cx="110" cy="270" r="0.8" fill="#ffffff" opacity="0.5"/>
                    <circle cx="240" cy="210" r="0.9" fill="#ffffff" opacity="0.4"/>
                    <circle cx="380" cy="160" r="0.7" fill="#ffffff" opacity="0.7"/>
                    <circle cx="510" cy="90" r="0.9" fill="#ffffff" opacity="0.3"/>
                    <circle cx="690" cy="270" r="0.8" fill="#ffffff" opacity="0.6"/>
                    <circle cx="810" cy="310" r="1" fill="#ffffff" opacity="0.4"/>
                    <circle cx="950" cy="510" r="0.7" fill="#ffffff" opacity="0.5"/>
                    <circle cx="730" cy="580" r="0.8" fill="#ffffff" opacity="0.3"/>
                    <circle cx="550" cy="630" r="0.9" fill="#ffffff" opacity="0.6"/>
                    <circle cx="290" cy="480" r="0.7" fill="#ffffff" opacity="0.4"/>
                    <circle cx="180" cy="320" r="1" fill="#ffffff" opacity="0.5"/>
                </g>

                <!-- Nebula Glow -->
                <circle cx="178" cy="122" r="180" fill="url(#nebulaPn)" style="mix-blend-mode: screen; pointer-events: none;" />

                <!-- Instability Strip -->
                <polygon class="instability-strip" points="332,45 416,45 430,660 346,660"/>
                <text class="instability-label" x="388" y="60" text-anchor="middle" transform="rotate(4 388 60)">instability strip</text>

                <!-- Background Track (5 M☉) -->
                <path class="bg-track" d="M470,300 C520,205 690,182 905,208"/>
                <text class="bg-track-label" x="556" y="176">5 M☉ (for scale)</text>

                <!-- Hayashi Track -->
                <path class="hayashi-zone" d="M918,80 C860,240 800,420 730,600 L930,660 L930,45 Z"/>
                <path class="hayashi-line" d="M918,80 C860,240 800,420 730,600"/>
                <text class="hayashi-label" x="879" y="352" transform="rotate(-67 879 352)">Hayashi track — fully convective (forbidden →)</text>

                <!-- ZAMS Band -->
                <line class="zams-band" x1="735" y1="590" x2="150" y2="150"/>
                <line class="zams-core" x1="735" y1="590" x2="150" y2="150"/>
                <text class="zams-label" x="470" y="392" transform="rotate(-37 470 392)">Zero Age Main Sequence</text>

                <!-- ==== SEGMENTS ==== -->
                <!-- Recessive segments -->
                <path class="seg seg-recessive" data-seg="s67" style="stroke:#f3e39a" d="M905,95 C640,70 410,95 178,122"/>
                <path class="seg seg-recessive" data-seg="s78" style="stroke:#a9cdf5" d="M178,122 C160,310 235,500 312,609"/>

                <!-- Hero segments with glow -->
                <g filter="url(#plasmaGlow)">
                    <path class="seg" data-seg="s12" style="stroke:#f6d867" d="M482,486 C486,474 490,462 496,450"/>
                    <path class="seg" data-seg="s23" style="stroke:#f2a950" d="M496,450 C520,442 560,430 596,419"/>
                    <path class="seg" data-seg="s34" style="stroke:#e8622f" d="M596,419 C720,405 812,340 815,150"/>
                    <path class="seg" data-seg="s45" style="stroke:#ff7a45" d="M815,150 C780,200 640,280 579,301"/>
                    <path class="seg" data-seg="s56" style="stroke:#d83c2c" d="M579,301 C558,288 566,268 590,272 C700,250 830,200 905,95"/>
                </g>

                <!-- Axes -->
                <line class="axis-line" x1="95" y1="660" x2="930" y2="660"/>
                <line class="axis-line" x1="95" y1="45"  x2="95"  y2="660"/>

                <!-- X Ticks -->
                <text class="tick-text" x="223.6" y="682" text-anchor="middle">8000</text>
                <text class="tick-text" x="432.3" y="682" text-anchor="middle">6000</text>
                <text class="tick-text" x="564.3" y="682" text-anchor="middle">5000</text>
                <text class="tick-text" x="726.3" y="682" text-anchor="middle">4000</text>
                <text class="tick-text" x="823.1" y="682" text-anchor="middle">3500</text>
                <text class="axis-label" x="512" y="718" text-anchor="middle">Surface temperature (K)   ← hotter · cooler →</text>

                <!-- Y Ticks -->
                <text class="tick-text" x="84" y="70" text-anchor="end">10,000</text>
                <text class="tick-text" x="84" y="172" text-anchor="end">1,000</text>
                <text class="tick-text" x="84" y="275" text-anchor="end">100</text>
                <text class="tick-text" x="84" y="377.5" text-anchor="end">10</text>
                <text class="tick-text" x="84" y="480" text-anchor="end">1</text>
                <text class="tick-text" x="84" y="582" text-anchor="end">0.1</text>
                <text class="axis-label" x="-352" y="28" transform="rotate(-90)" text-anchor="middle">Luminosity (L / L☉)</text>

                <!-- ==== POINTS ==== -->
                <g class="node" data-pt="p1" style="--pc:#f6d867" tabindex="0" role="button" aria-label="ZAMS">
                    <circle class="pt" cx="482" cy="486" r="12"/>
                    <text class="pt-num" x="482" y="486">1</text>
                    <text class="pt-lbl" x="462" y="486" text-anchor="end" dominant-baseline="central">ZAMS</text>
                </g>
                <g class="node" data-pt="p2" style="--pc:#f4e08a" tabindex="0" role="button" aria-label="TAMS">
                    <circle class="pt" cx="496" cy="450" r="12"/>
                    <text class="pt-num" x="496" y="450">2</text>
                    <text class="pt-lbl" x="516" y="450" dominant-baseline="central">TAMS</text>
                </g>
                <g class="node" data-pt="p3" style="--pc:#f2a950" tabindex="0" role="button" aria-label="RGB base">
                    <circle class="pt" cx="596" cy="419" r="12"/>
                    <text class="pt-num" x="596" y="419">3</text>
                    <text class="pt-lbl" x="616" y="419" dominant-baseline="central">RGB base</text>
                </g>
                <g class="node" data-pt="p4" style="--pc:#ff7a45" tabindex="0" role="button" aria-label="RGB tip · He flash">
                    <circle class="pt" cx="815" cy="150" r="12"/>
                    <text class="pt-num" x="815" y="150">4</text>
                    <text class="pt-lbl" x="795" y="150" text-anchor="end" dominant-baseline="central">RGB tip · He flash</text>
                </g>
                <g class="node" data-pt="p5" style="--pc:#efc94a" tabindex="0" role="button" aria-label="Horizontal Branch">
                    <circle class="pt" cx="579" cy="301" r="12"/>
                    <text class="pt-num" x="579" y="301">5</text>
                    <text class="pt-lbl" x="559" y="301" text-anchor="end" dominant-baseline="central">Horizontal Branch</text>
                </g>
                <g class="node" data-pt="p6" style="--pc:#d83c2c" tabindex="0" role="button" aria-label="AGB tip">
                    <circle class="pt" cx="905" cy="95" r="12"/>
                    <text class="pt-num" x="905" y="95">6</text>
                    <text class="pt-lbl" x="885" y="95" text-anchor="end" dominant-baseline="central">AGB tip</text>
                </g>
                <g class="node" data-pt="p7" style="--pc:#cfe3ff" tabindex="0" role="button" aria-label="Planetary Nebula">
                    <circle class="pt" cx="178" cy="122" r="12"/>
                    <text class="pt-num" x="178" y="122">7</text>
                    <text class="pt-lbl" x="178" y="98" text-anchor="middle">Planetary Nebula</text>
                </g>
                <g class="node" data-pt="p8" style="--pc:#a9cdf5" tabindex="0" role="button" aria-label="White Dwarf">
                    <circle class="pt" cx="312" cy="609" r="12"/>
                    <text class="pt-num" x="312" y="609">8</text>
                    <text class="pt-lbl" x="332" y="609" dominant-baseline="central">White Dwarf</text>
                </g>

                <!-- ==== SEGMENT HIT AREAS ==== -->
                <!-- Must be on top to intercept clicks easily -->
                <path class="seg-hit" data-seg="s12" d="M482,486 C486,474 490,462 496,450"/>
                <path class="seg-hit" data-seg="s23" d="M496,450 C520,442 560,430 596,419"/>
                <path class="seg-hit" data-seg="s34" d="M596,419 C720,405 812,340 815,150"/>
                <path class="seg-hit" data-seg="s45" d="M815,150 C780,200 640,280 579,301"/>
                <path class="seg-hit" data-seg="s56" d="M579,301 C558,288 566,268 590,272 C700,250 830,200 905,95"/>
                <path class="seg-hit" data-seg="s67" d="M905,95 C640,70 410,95 178,122"/>
                <path class="seg-hit" data-seg="s78" d="M178,122 C160,310 235,500 312,609"/>
            </svg>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background:#f6d867; box-shadow: 0 0 10px rgba(246,216,103,0.5);"></div><span>Main sequence</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#f2a950; box-shadow: 0 0 10px rgba(242,169,80,0.5);"></div><span>Subgiant</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#e8622f; box-shadow: 0 0 10px rgba(232,98,47,0.5);"></div><span>Red giant</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#ff7a45; box-shadow: 0 0 10px rgba(255,122,69,0.5);"></div><span>He flash</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#efc94a; box-shadow: 0 0 10px rgba(239,201,74,0.5);"></div><span>Horizontal branch</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#d83c2c; box-shadow: 0 0 10px rgba(216,60,44,0.5);"></div><span>AGB</span></div>
            <div class="legend-item"><div class="legend-dash" style="border-color:#f3e39a;"></div><span>Post-AGB (rapid)</span></div>
            <div class="legend-item"><div class="legend-dash" style="border-color:#a9cdf5;"></div><span>WD cooling (slow)</span></div>
        </div>
    </div>
</body>
</html>
